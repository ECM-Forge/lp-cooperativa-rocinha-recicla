<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="100%" height="100%">
  <!-- Fundo creme refinado -->
  <rect width="1440" height="900" fill="#fdfbf7" />
  
  <!-- Formas e padrões ecológicos de gradiente sutil -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A7D44" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#F4A01C" stop-opacity="0.01" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F4A01C" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#3A7D44" stop-opacity="0.02" />
    </linearGradient>
  </defs>
  
  <!-- Círculos e curvas orgânicas gigantes e abstratas -->
  <path d="M-100,300 C300,100 600,600 900,400 C1100,260 1300,700 1600,500 L1600,900 L-100,900 Z" fill="url(#grad1)" />
  <path d="M-50,600 C400,400 800,800 1100,550 C1300,380 1400,750 1600,700 L1600,900 L-50,900 Z" fill="url(#grad2)" />
  
  <!-- Linhas finas editoriais (linhas de fluxo ecológico / topografia) -->
  <path d="M-100,280 C300,80 600,580 900,380 C1100,240 1300,680 1600,480" fill="none" stroke="#3A7D44" stroke-width="1" stroke-opacity="0.08" />
  <path d="M-100,260 C300,60 600,560 900,360 C1100,220 1300,660 1600,460" fill="none" stroke="#3A7D44" stroke-width="1" stroke-opacity="0.05" />
  <path d="M-100,320 C300,120 600,620 900,420 C1100,280 1300,720 1600,520" fill="none" stroke="#F4A01C" stroke-width="1" stroke-opacity="0.08" />
  
  <!-- Ilustração abstrata de folhas estilizadas com opacidade discreta -->
  <g transform="translate(80, 100) scale(1.5)" opacity="0.08">
    <path d="M50,0 C70,30 60,70 30,80 C10,70 0,30 20,0 Z" fill="#3A7D44" />
    <path d="M20,0 C0,30 10,70 40,80 C60,70 70,30 50,0 Z" fill="#3A7D44" />
    <line x1="35" y1="80" x2="35" y2="100" stroke="#3A7D44" stroke-width="2" />
  </g>
  
  <g transform="translate(1300, 680) scale(2)" opacity="0.08">
    <path d="M50,0 C70,30 60,70 30,80 C10,70 0,30 20,0 Z" fill="#3A7D44" />
    <line x1="35" y1="80" x2="35" y2="110" stroke="#3A7D44" stroke-width="2" />
  </g>
</svg>
